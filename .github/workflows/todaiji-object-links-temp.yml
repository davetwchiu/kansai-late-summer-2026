name: Temporary Tōdai-ji object-link patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'Trigger Tōdai-ji object-link patch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/todaiji-object-links
          fetch-depth: 0
      - name: Replace generic museum links with exact official object pages
        run: |
          python - <<'PY'
          from pathlib import Path

          js_path = Path('assets/todaiji.js')
          js = js_path.read_text()
          replacements = {
              '<p class="object-source"><a href="https://www.todaiji.or.jp/information/museum/" target="_blank" rel="noopener">官方館藏圖入口 ↗</a></p></article>': None,
          }

          old_birth = '<h3>誕生釋迦佛與灌佛盤</h3><p><strong>先理解：</strong>小像右手指天、左手指地，原為佛誕日灌佛會使用。香水由小像頭頂澆下，再落入大型盤中；像與盤的比例由儀式操作決定。</p><p><strong>現場看：</strong>小像的手勢、腰部轉折、金層磨損；盤上浮雕或線刻如何把龍、花與佛誕敘事繞成一圈。把它當作被反覆使用的法會器具，避免只視為精巧小雕像。</p><p class="object-source"><a href="https://www.todaiji.or.jp/information/museum/" target="_blank" rel="noopener">官方館藏圖入口 ↗</a></p>'
          new_birth = '<h3>誕生釋迦佛與灌佛盤</h3><p><strong>先理解：</strong>小像右手指天、左手指地，原為佛誕日灌佛會使用。香水由小像頭頂澆下，再落入大型盤中；像與盤的比例由儀式操作決定。</p><p><strong>現場看：</strong>小像的手勢、腰部轉折、金層磨損；盤上浮雕或線刻如何把龍、花與佛誕敘事繞成一圈。把它當作被反覆使用的法會器具，避免只視為精巧小雕像。</p><p class="object-source"><a data-object-link="birth-buddha" href="https://online.bunka.go.jp/db/heritages/detail/192443" target="_blank" rel="noopener">文化庁：誕生釋迦佛作品頁（圖像） ↗</a> · <a href="https://www.tnm.jp/modules/r_free_page/index.php?id=704&amp;lang=ja" target="_blank" rel="noopener">東京國立博物館：實物展覽圖像 ↗</a></p>'

          old_half = '<h3>菩薩半跏像</h3><p><strong>先理解：</strong>半跏姿把一腿垂下、另一腿屈放，常用於沉思或即將起身救濟的菩薩形象。小型金銅佛便於供養、移動與近距離禮拜。</p><p><strong>現場看：</strong>寶冠、面相、指尖、膝部轉折與衣紋在極小尺度如何保持清楚；再看鑄造後修整、鍍金殘留與磨蝕。</p><p class="object-source"><a href="https://www.todaiji.or.jp/information/museum/" target="_blank" rel="noopener">官方館藏圖入口 ↗</a></p>'
          new_half = '<h3>菩薩半跏像</h3><p><strong>先理解：</strong>半跏姿把一腿垂下、另一腿屈放，常用於沉思或即將起身救濟的菩薩形象。小型金銅佛便於供養、移動與近距離禮拜。</p><p><strong>現場看：</strong>寶冠、面相、指尖、膝部轉折與衣紋在極小尺度如何保持清楚；再看鑄造後修整、鍍金殘留與磨蝕。</p><p class="object-source"><a data-object-link="half-seated" href="https://online.bunka.go.jp/db/heritages/detail/152018" target="_blank" rel="noopener">文化庁：銅造如意輪觀音半跏像（圖像） ↗</a></p>'

          old_shaka = '<h3>釋迦／多寶如來坐像</h3><p><strong>先理解：</strong>兩佛並坐源自《法華經》見寶塔品：多寶如來證明釋迦說法真實，釋迦入塔並坐。成對配置本身就是經文敘事。</p><p><strong>現場看：</strong>兩像手印、身軀比例、衣紋與背光是否刻意相近；共享空間如何讓「兩尊」讀成「一個事件」。</p><p class="object-source"><a href="https://www.todaiji.or.jp/information/museum/" target="_blank" rel="noopener">官方館藏圖入口 ↗</a></p>'
          new_shaka = '<h3>釋迦／多寶如來坐像</h3><p><strong>先理解：</strong>兩佛並坐源自《法華經》見寶塔品：多寶如來證明釋迦說法真實，釋迦入塔並坐。成對配置本身就是經文敘事。</p><p><strong>現場看：</strong>兩像手印、身軀比例、衣紋與背光是否刻意相近；共享空間如何讓「兩尊」讀成「一個事件」。</p><p class="object-source"><a data-object-link="shaka-taho" href="https://online.bunka.go.jp/heritages/detail/266902/2" target="_blank" rel="noopener">文化庁：釋迦多寶如來坐像（三幅圖） ↗</a></p>'

          old_benten = '<h3>辯才天、吉祥天</h3><p><strong>先理解：</strong>兩像原屬法華堂群像。辯才天與語言、音樂、智慧和水相關；吉祥天關聯福德與繁榮。女性神格在國家寺院中承擔護國、增益與法會功能。</p><p><strong>現場看：</strong>服飾層次、殘彩、髮式與身體重心。泥塑極怕震動，移入免震館舍本身就是保存史的一部分。</p><p class="object-source"><a href="https://www.todaiji.or.jp/information/museum/" target="_blank" rel="noopener">官方館藏圖入口 ↗</a></p>'
          new_benten = '<h3>辯才天、吉祥天</h3><p><strong>先理解：</strong>兩像原屬法華堂群像。辯才天與語言、音樂、智慧和水相關；吉祥天關聯福德與繁榮。女性神格在國家寺院中承擔護國、增益與法會功能。</p><p><strong>現場看：</strong>服飾層次、殘彩、髮式與身體重心。泥塑極怕震動，移入免震館舍本身就是保存史的一部分。</p><p class="object-source"><a data-object-link="benten-kichijoten" href="https://online.bunka.go.jp/db/heritages/detail/181542" target="_blank" rel="noopener">文化庁：塑造辯才天・吉祥天立像（圖像） ↗</a></p>'

          for old, new, label in [
              (old_birth, new_birth, 'birth Buddha'),
              (old_half, new_half, 'half-seated bodhisattva'),
              (old_shaka, new_shaka, 'Shaka/Taho'),
              (old_benten, new_benten, 'Benten/Kichijoten'),
          ]:
              if old not in js:
                  raise SystemExit(f'Exact source block not found: {label}')
              js = js.replace(old, new, 1)
          js_path.write_text(js)

          smoke_path = Path('scripts/smoke_todaiji.cjs')
          smoke = smoke_path.read_text()
          marker = '    const objectCount = await page.locator("#object-room [data-object-material]").count();'
          addition = '''    const expectedObjectLinks = {\n      "birth-buddha": "online.bunka.go.jp/db/heritages/detail/192443",\n      "half-seated": "online.bunka.go.jp/db/heritages/detail/152018",\n      "shaka-taho": "online.bunka.go.jp/heritages/detail/266902/2",\n      "benten-kichijoten": "online.bunka.go.jp/db/heritages/detail/181542",\n    };\n    for (const [key, expected] of Object.entries(expectedObjectLinks)) {\n      const href = await page.locator(`[data-object-link="${key}"]`).getAttribute("href");\n      if (!href || !href.includes(expected)) errors.push(`${key} does not link to its exact official object page`);\n    }\n\n'''
          if 'expectedObjectLinks' not in smoke:
              if marker not in smoke:
                  raise SystemExit('Smoke-test insertion marker not found')
              smoke = smoke.replace(marker, addition + marker, 1)
              smoke_path.write_text(smoke)

          sw_path = Path('sw.js')
          sw = sw_path.read_text()
          if 'kansai-todaiji-v8' not in sw:
              if 'kansai-todaiji-v7' not in sw:
                  raise SystemExit('Expected cache version not found')
              sw = sw.replace('kansai-todaiji-v7', 'kansai-todaiji-v8', 1)
              sw_path.write_text(sw)
          PY
      - name: Validate patch
        run: |
          node --check assets/todaiji.js
          node --check scripts/smoke_todaiji.cjs
          node --check sw.js
          python -m pip install --quiet beautifulsoup4
          python scripts/validate_site.py
      - name: Commit patch to feature branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/todaiji.js scripts/smoke_todaiji.cjs sw.js
          git commit -m "Link Tōdai-ji objects to exact official pages"
          git push origin HEAD:fix/todaiji-object-links
