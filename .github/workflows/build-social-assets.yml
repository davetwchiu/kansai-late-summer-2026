name: Build social assets

on:
  push:
    branches:
      - feature/social-preview-home-icon
    paths:
      - '.github/generated-assets/icon.part*'
      - '.github/workflows/build-social-assets.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/generated-assets/icon.part*'
      - '.github/workflows/build-social-assets.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image and validation tools
        run: python -m pip install --disable-pip-version-check pillow beautifulsoup4

      - name: Build icon and sharing image
        shell: bash
        run: |
          cat .github/generated-assets/icon.part* | base64 --decode > apple-touch-icon.png
          python - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageOps

          root = Path('.')
          icon = Image.open(root / 'apple-touch-icon.png').convert('RGBA')
          icon = ImageOps.fit(icon, (180, 180), method=Image.Resampling.LANCZOS)
          icon.save(root / 'apple-touch-icon.png', optimize=True)
          (root / 'assets' / 'images').mkdir(parents=True, exist_ok=True)
          icon.save(root / 'assets' / 'images' / 'apple-touch-icon.png', optimize=True)

          hero = Image.open(root / 'assets' / 'images' / 'hero-kansai-editorial.webp').convert('RGB')
          social = ImageOps.fit(hero, (1200, 630), method=Image.Resampling.LANCZOS, centering=(0.5, 0.5))
          social.save(root / 'assets' / 'images' / 'social-preview.png', optimize=True)
          PY

      - name: Add web app manifest and social metadata
        shell: bash
        run: |
          cat > manifest.webmanifest <<'JSON'
          {
            "name": "2026 關西晚夏旅程誌",
            "short_name": "關西晚夏",
            "lang": "zh-Hant",
            "start_url": "./",
            "scope": "./",
            "display": "standalone",
            "background_color": "#f4f0e8",
            "theme_color": "#183746",
            "icons": [
              {
                "src": "apple-touch-icon.png",
                "sizes": "180x180",
                "type": "image/png",
                "purpose": "any"
              }
            ]
          }
          JSON

          python - <<'PY'
          from pathlib import Path
          import html
          import re

          base = 'https://davetwchiu.github.io/kansai-late-summer-2026/'
          image = base + 'assets/images/social-preview.png'
          pages = [
              Path('index.html'), Path('daily.html'), Path('deep-itinerary.html'),
              Path('culture.html'), Path('museums.html'), Path('food.html'), Path('maps.html')
          ]

          for path in pages:
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'\n?\s*<!-- social-meta:start -->.*?<!-- social-meta:end -->\s*', '\n', text, flags=re.S)
              title_match = re.search(r'<title>(.*?)</title>', text, flags=re.I | re.S)
              desc_tag_match = re.search(
                  r'<meta\b(?=[^>]*\bname\s*=\s*["\']description["\'])[^>]*>',
                  text,
                  flags=re.I | re.S,
              )
              if not title_match or not desc_tag_match:
                  raise SystemExit(f'{path}: title or description missing')
              content_match = re.search(
                  r'\bcontent\s*=\s*["\']([^"\']*)["\']',
                  desc_tag_match.group(0),
                  flags=re.I | re.S,
              )
              if not content_match:
                  raise SystemExit(f'{path}: description content missing')

              title = html.unescape(title_match.group(1).strip())
              description = html.unescape(content_match.group(1).strip())
              page_url = base if path.name == 'index.html' else base + path.name
              block = f'''  <!-- social-meta:start -->
              <meta name="theme-color" content="#183746">
              <meta name="apple-mobile-web-app-title" content="關西晚夏">
              <meta name="apple-mobile-web-app-capable" content="yes">
              <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
              <link rel="icon" type="image/png" href="apple-touch-icon.png">
              <link rel="manifest" href="manifest.webmanifest">
              <link rel="canonical" href="{html.escape(page_url, quote=True)}">
              <meta property="og:type" content="website">
              <meta property="og:locale" content="zh_HK">
              <meta property="og:site_name" content="關西晚夏旅程誌">
              <meta property="og:title" content="{html.escape(title, quote=True)}">
              <meta property="og:description" content="{html.escape(description, quote=True)}">
              <meta property="og:url" content="{html.escape(page_url, quote=True)}">
              <meta property="og:image" content="{html.escape(image, quote=True)}">
              <meta property="og:image:type" content="image/png">
              <meta property="og:image:width" content="1200">
              <meta property="og:image:height" content="630">
              <meta property="og:image:alt" content="2026 關西晚夏旅程誌">
              <meta name="twitter:card" content="summary_large_image">
              <meta name="twitter:title" content="{html.escape(title, quote=True)}">
              <meta name="twitter:description" content="{html.escape(description, quote=True)}">
              <meta name="twitter:image" content="{html.escape(image, quote=True)}">
              <!-- social-meta:end -->'''
              text = text.replace(desc_tag_match.group(0), desc_tag_match.group(0) + '\n' + block, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Validate generated assets and site
        shell: bash
        run: |
          python scripts/validate_site.py
          python - <<'PY'
          from pathlib import Path
          import json
          from PIL import Image
          from bs4 import BeautifulSoup

          assert Image.open('apple-touch-icon.png').size == (180, 180)
          assert Image.open('assets/images/social-preview.png').size == (1200, 630)
          json.loads(Path('manifest.webmanifest').read_text(encoding='utf-8'))
          for path in Path('.').glob('*.html'):
              soup = BeautifulSoup(path.read_text(encoding='utf-8'), 'html.parser')
              assert soup.find('link', rel='apple-touch-icon'), path
              assert soup.find('meta', property='og:image'), path
              assert soup.find('meta', attrs={'name': 'twitter:card'}), path
          PY

      - name: Commit generated files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apple-touch-icon.png assets/images/apple-touch-icon.png assets/images/social-preview.png manifest.webmanifest *.html
          git rm -f .github/generated-assets/icon.part*
          git diff --cached --quiet && exit 0
          git commit -m 'Add social preview and home screen icon [skip ci]'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
