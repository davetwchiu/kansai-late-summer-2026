name: Install deep-content site bundle

on:
  push:
    branches: ["main", "content/deepen-site"]
    paths:
      - "site-content.tar.gz.b64"
      - ".github/workflows/unpack-content.yml"

permissions:
  contents: write

jobs:
  install-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out triggering branch
        uses: actions/checkout@v7

      - name: Decode and verify bundle
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode site-content.tar.gz.b64 > /tmp/site-content.tar.gz
          echo "da9ecaa8d97cec7a5a9e53b1ea8872065df8610c653121ca77c73fb9dacb2141  /tmp/site-content.tar.gz" | sha256sum --check -
          mkdir -p /tmp/site-content
          tar -xzf /tmp/site-content.tar.gz -C /tmp/site-content

      - name: Replace repository working tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github ! -name site-content.tar.gz.b64 -exec rm -rf {} +
          find .github/workflows -type f ! -name unpack-content.yml -delete
          cp -a /tmp/site-content/. .
          rm -f site-content.tar.gz.b64 .github/workflows/unpack-content.yml

      - name: Validate complete site
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check beautifulsoup4
          python scripts/validate_site.py

      - name: Commit generated tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "content: deepen itinerary, culture, museum and dining guides"
          git push origin HEAD:${GITHUB_REF_NAME}
