name: Materialize, validate and publish deep-content site

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deep-content-${{ github.ref }}
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Decode and verify deep-content bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f site-content.tar.gz.b64
          base64 --decode site-content.tar.gz.b64 > /tmp/site-content.tar.gz
          echo "da9ecaa8d97cec7a5a9e53b1ea8872065df8610c653121ca77c73fb9dacb2141  /tmp/site-content.tar.gz" | sha256sum --check -
          rm -rf /tmp/site-content
          mkdir -p /tmp/site-content
          tar -xzf /tmp/site-content.tar.gz -C /tmp/site-content

      - name: Replace branch with exact validated site tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/site-content/. .

      - name: Validate pages, links, data and privacy
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check beautifulsoup4
          python scripts/validate_site.py

      - name: Commit materialized site to pull-request branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "content: deepen itinerary, culture, museum and dining guides"
          git push origin HEAD:${{ github.head_ref }}

  publish-preview:
    needs: materialize
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out materialized branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
