name: Validate and deploy site

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-todaiji-materials:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/todaiji-material-examples'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out material patch branch
        uses: actions/checkout@v7
        with:
          ref: fix/todaiji-material-examples
          fetch-depth: 0
      - name: Apply material microscope patch
        run: python scripts/patch_todaiji_material_examples.py
      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check beautifulsoup4
      - name: Validate patch
        run: |
          node --check assets/todaiji.js
          node --check sw.js
          python scripts/validate_site.py
          python scripts/test_todaiji_material_examples.py
      - name: Commit patch to feature branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add todaiji.html sw.js scripts/test_todaiji_material_examples.py
          if git diff --cached --quiet; then
            echo "No patch needed"
          else
            git commit -m "Simplify Tōdai-ji material microscope"
            git push origin HEAD:fix/todaiji-material-examples
          fi

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check beautifulsoup4
      - name: Validate pages, links, data and privacy
        run: python scripts/validate_site.py

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
