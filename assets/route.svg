  </defs>
  <rect x="34" y="34" width="552" height="452" rx="34" fill="#214759" stroke="#7fa0ad" stroke-opacity=".45"/>
  <path d="M135 330 C190 282 245 306 292 254 S395 168 477 189" fill="none" stroke="url(#g)" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 14"/>
  <path d="M292 254 C334 315 400 350 462 369" fill="none" stroke="#dce7ea" stroke-width="2" stroke-dasharray="8 12"/>
  <path d="M292 254 C230 205 195 163 154 118" fill="none" stroke="#dce7ea" stroke-width="2" stroke-dasharray="8 12"/>
